name: Unzip Wasmer Bio

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  unzip:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Unzip wasmer-bio
        run: |
          unzip wasmer-bio.zip -d .
          mv wasmer/* .
          rm -rf wasmer wasmer-bio.zip

      - name: Commit extracted files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "chore: extract wasmer-bio project files"
          git push
